name: hr_web
description: HR Web Admin Portal — Team Lead / Manager / HR Admin / Super Admin / C-Level.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  hr_core:
    path: ../../packages/hr_core

  flutter_bloc: ^9.1.1
  go_router: ^17.0.0
  get_it: ^9.2.1
  equatable: ^2.1.0
  easy_localization: ^3.0.8
  google_fonts: ^6.3.2
  fl_chart: ^0.69.2
  shared_preferences: ^2.5.3
  flutter_screenutil: ^5.9.3
  iconsax_flutter: ^1.0.1
  shimmer: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
