<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="HR Portal — Enterprise HR & Workforce Management System">
  <meta name="theme-color" content="#0B6E64">

  <!-- Google Fonts Preconnect & Stylesheets -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HR Portal">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico">

  <title>HR Portal</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #12181C;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    #app-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #12181C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
    }

    #app-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: brandPulse 2s ease-in-out infinite alternate;
    }

    .loader-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 12px 32px rgba(11, 110, 100, 0.35);
      object-fit: cover;
    }

    .loader-title {
      color: #E1E7EA;
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .loader-spinner-container {
      margin-top: 32px;
    }

    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(11, 110, 100, 0.2);
      border-top: 3px solid #0B6E64;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes brandPulse {
      0% {
        transform: scale(0.98);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.02);
        opacity: 1;
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    function removeAppLoader() {
      const loader = document.getElementById('app-loader');
      if (loader && !loader.classList.contains('loaded')) {
        loader.classList.add('loaded');
        setTimeout(function() {
          if (loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 450);
      }
    }

    // Handlers for Flutter first frame and engine load
    window.addEventListener('flutter-first-frame', removeAppLoader);
    
    // Safety fallback timer if event doesn't fire within 8s
    setTimeout(removeAppLoader, 8000);
  </script>
</head>
<body>
  <div id="app-loader" aria-label="Loading HR Portal">
    <div class="loader-brand">
      <img src="app_logo.png" alt="HR Portal Logo" class="loader-logo">
      <h1 class="loader-title">HR Portal</h1>
    </div>
    <div class="loader-spinner-container">
      <div class="loader-spinner"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
