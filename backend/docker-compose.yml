version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hr_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hr_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password123@postgres:5432/hr_db?schema=public"
      JWT_SECRET: "super-secret-jwt-key-hr-app-demo-phase-22"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
